<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAXILIMON - Sumas</title>
  <style>
    :root {
      --bg1: #0b1023;
      --bg2: #142850;
      --card: #1f2a44;
      --text: #f5f7ff;
      --accent: #ff4757;
      --accent2: #2ed573;
      --accent3: #1e90ff;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    .contenedor {
      width: 100vw;
      min-height: 100vh;
      background: var(--card);
      padding: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: stretch;
      gap: 24px;
    }

    .fondos-bloques {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        linear-gradient(#00ff8877 2px, transparent 2px),
        linear-gradient(90deg, #00ff8877 2px, transparent 2px);
      background-size: 40px 40px;
      mix-blend-mode: screen;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 1px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      text-shadow: 0 0 10px #ff4757aa;
    }

    .subtitulo {
      margin-top: 0;
      margin-bottom: 12px;
      color: #fffa;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700;
    }

    .zona-juego {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 10px 6px;
    }

    .panel-niveles {
      width: min(520px, 42vw);
      min-width: 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 28px 18px;
      background: #00000033;
      border-left: 4px solid #ffffff44;
    }

    .niveles-barra {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 320px;
      position: relative;
      padding: 10px 0;
    }

    .niveles-barra::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #74b9ff, #2ed573, #a55eea);
      opacity: 0.8;
    }

    .nivel-chip {
      width: 190px;
      min-height: 72px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 3px solid #ffffff55;
      font-size: 1.35rem;
      color: #dfe6ff;
      background: #00000055;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: relative;
      z-index: 1;
    }

    .nivel-chip.activo {
      background: linear-gradient(135deg, #ff4757, #ffa502);
      border-color: #ffffffcc;
      color: #fff;
      box-shadow: 0 0 12px #ff4757aa;
      transform: translateY(-1px);
    }

    .nivel-chip.completado {
      background: linear-gradient(135deg, #2ed573, #1e90ff);
      border-color: #ffffffcc;
      color: #fff;
    }

    .nivel-chip span {
      font-weight: 700;
      font-size: 1.5rem;
    }

    .boss-chip {
      border-color: #ff00ffaa;
      background: radial-gradient(circle at top, #ff00ff, #341f97);
    }

    .operacion {
      font-size: clamp(3rem, 11vw, 7rem);
      font-weight: 800;
      margin: 10px 0;
      min-height: 100px;
      color: #ffffff;
      background: linear-gradient(90deg, #ff475744, #1e90ff55);
      border-radius: 18px;
      padding: 16px 22px;
    }

    .texto-nivel {
      font-size: clamp(1.3rem, 3.8vw, 2rem);
      color: #e0e8ff;
      margin-top: 0;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .progreso {
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      color: #c7d2ff;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .progreso-wrap {
      width: min(320px, 90%);
      display: none;
      margin-top: 4px;
    }

    .barra-titulo {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
    }

    .barra-fondo {
      width: 100%;
      height: 24px;
      border-radius: 999px;
      background: #00000066;
      border: 3px solid #ffffff55;
      overflow: hidden;
    }

    .barra-relleno {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1e90ff, #2ed573);
      transition: width 0.25s ease;
    }

    .boss-vida-wrap {
      width: min(360px, 95%);
      display: none;
      margin-top: 8px;
      padding: 10px;
      border: 3px solid #ff6bd6;
      border-radius: 16px;
      background: radial-gradient(circle at top, #3a1c71aa, #00000066);
      box-shadow: 0 0 16px #ff00ffaa;
    }

    .boss-vida-wrap .barra-titulo {
      font-size: 1.45rem;
      letter-spacing: 1px;
      color: #ffd1ff;
    }

    .boss-vida-wrap .barra-fondo {
      height: 34px;
      border: 3px solid #ff9ff3;
      background: #12001f;
    }

    .boss-vida-wrap .barra-relleno {
      background: linear-gradient(90deg, #2ed573, #feca57, #ff4757);
    }

    .fila {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 20px 26px;
      font-size: clamp(1.4rem, 3.8vw, 2.3rem);
      cursor: pointer;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 4px 0 #00000066;
      transform: translateY(0);
      transition: transform 0.08s, box-shadow 0.08s, filter 0.15s;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #00000066;
      filter: brightness(0.9);
    }

    .pantalla-respuesta {
      width: min(420px, 90vw);
      min-height: 90px;
      padding: 10px 16px;
      border-radius: 16px;
      border: 3px solid #ffffff88;
      background: #00000066;
      color: #fff;
      font-size: clamp(2.4rem, 8vw, 4.8rem);
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .teclado {
      width: min(520px, 94vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 8px auto;
    }

    .tecla {
      min-height: 86px;
      background: linear-gradient(135deg, #1e90ff, #00d2ff);
      font-size: clamp(2rem, 6vw, 3.2rem);
      padding: 10px;
    }

    .tecla.borrar {
      background: linear-gradient(135deg, #ff7f50, #ff9966);
    }

    .boton-comprobar {
      width: min(520px, 94vw);
      min-height: 92px;
      margin-top: 6px;
      background: linear-gradient(135deg, #2ed573, #20bf6b);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
    }

    .mensaje {
      min-height: 92px;
      margin-top: 8px;
      border-radius: 16px;
      padding: 18px;
      background: #00000055;
      font-size: clamp(1.5rem, 4.5vw, 2.6rem);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .anuncio-nivel {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000000b3;
      z-index: 50;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 18px #00d2ff, 0 0 28px #ff4757;
      text-align: center;
      padding: 20px;
    }

    .reinicio-wrap {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000000b3;
      z-index: 60;
    }

    .btn-reinicio {
      min-width: min(520px, 85vw);
      min-height: 110px;
      border-radius: 20px;
      border: 4px solid #ffffffcc;
      background: linear-gradient(135deg, #2ed573, #1e90ff);
      color: #fff;
      font-size: clamp(2rem, 6vw, 3.3rem);
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 20px #2ed573aa;
      animation: pulso-reinicio 1.1s ease-in-out infinite;
    }

    @keyframes pulso-reinicio {
      0% {
        transform: scale(1);
        box-shadow: 0 0 14px #2ed57388;
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 28px #2ed573ee;
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 14px #2ed57388;
      }
    }

    .imagen-logro {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 45;
      pointer-events: none;
      background: #00000066;
    }

    .imagen-logro img {
      max-width: min(50vw, 420px);
      max-height: min(50vh, 420px);
      object-fit: contain;
      filter: drop-shadow(0 0 18px #ffffffcc);
    }

    .ok {
      color: var(--accent2);
    }

    .error {
      color: #ff4d4d;
    }

    .boss-mensaje { display: none; }

    @media (max-width: 980px) {
      .contenedor {
        flex-direction: column;
        align-items: center;
      }

      .panel-niveles {
        width: 100%;
        min-width: 0;
        border-left: none;
        border-top: 3px solid #ffffff33;
      }

      .niveles-barra {
        max-width: none;
      }

      .nivel-chip {
        width: min(260px, 85vw);
      }
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <div class="fondos-bloques"></div>
    <section class="zona-juego">
      <h1>MAXILIMÓN</h1>
      <p class="subtitulo">SUMAS</p>

      <div id="operacion" class="operacion">0 + 0 = ?</div>

      <div id="pantallaRespuesta" class="pantalla-respuesta">_</div>

      <div class="teclado">
        <button class="tecla" type="button" data-num="1">1</button>
        <button class="tecla" type="button" data-num="2">2</button>
        <button class="tecla" type="button" data-num="3">3</button>
        <button class="tecla" type="button" data-num="4">4</button>
        <button class="tecla" type="button" data-num="5">5</button>
        <button class="tecla" type="button" data-num="6">6</button>
        <button class="tecla" type="button" data-num="7">7</button>
        <button class="tecla" type="button" data-num="8">8</button>
        <button class="tecla" type="button" data-num="9">9</button>
        <button class="tecla borrar" type="button" id="btnBorrar" aria-label="Borrar último">←</button>
        <button class="tecla" type="button" data-num="0">0</button>
        <button class="tecla borrar" type="button" id="btnTodoBorrar" aria-label="Borrar todo">X</button>
      </div>

      <button id="btnComprobar" class="boton-comprobar" type="button">COMPROBAR</button>

      <div id="mensaje" class="mensaje"></div>
    </section>

    <aside class="panel-niveles">
      <div class="niveles-barra">
        <div class="nivel-chip activo" id="chip-nivel-1"><span>1</span></div>
        <div class="nivel-chip" id="chip-nivel-2"><span>2</span></div>
        <div class="nivel-chip" id="chip-nivel-3"><span>3</span></div>
        <div class="nivel-chip" id="chip-nivel-4"><span>4</span></div>
        <div class="nivel-chip" id="chip-nivel-5"><span>5</span></div>
        <div class="nivel-chip boss-chip" id="chip-nivel-6"><span>BOSS</span></div>
      </div>

      <p id="textoNivel" class="texto-nivel"></p>
      <p id="textoProgreso" class="progreso"></p>
      <div id="progresoWrap" class="progreso-wrap">
        <p class="barra-titulo">PROGRESO</p>
        <div class="barra-fondo">
          <div id="progresoRelleno" class="barra-relleno"></div>
        </div>
      </div>
      <div id="bossVidaWrap" class="boss-vida-wrap">
        <p class="barra-titulo">VIDA BOSS</p>
        <div class="barra-fondo">
          <div id="bossVidaRelleno" class="barra-relleno"></div>
        </div>
      </div>
      <div id="mensajeBoss" class="boss-mensaje"></div>
    </aside>
  </main>
  <div id="imagenLogro" class="imagen-logro">
    <img id="imagenLogroSrc" alt="Logro">
  </div>
  <div id="anuncioNivel" class="anuncio-nivel"></div>
  <div id="reinicioWrap" class="reinicio-wrap">
    <button id="btnReiniciar" class="btn-reinicio" type="button">JUGAR DE NUEVO</button>
  </div>

  <script>
    let numero1 = null;
    let numero2 = null;
    let nivelActual = 1;       // 1 a 6 (6 = BOSS)
    let aciertosNivel = 0;
    const metaPorNivel = 5;    // 5 aciertos para pasar cada nivel
    let entradaActual = "";
    let bloqueado = false;
    let timerSiguiente = null;
    let juegoTerminado = false;

    const operacion = document.getElementById("operacion");
    const pantallaRespuesta = document.getElementById("pantallaRespuesta");
    const mensaje = document.getElementById("mensaje");
    const mensajeBoss = document.getElementById("mensajeBoss");
    const btnComprobar = document.getElementById("btnComprobar");
    const btnBorrar = document.getElementById("btnBorrar");
    const btnTodoBorrar = document.getElementById("btnTodoBorrar");
    const textoNivel = document.getElementById("textoNivel");
    const textoProgreso = document.getElementById("textoProgreso");
    const progresoWrap = document.getElementById("progresoWrap");
    const progresoRelleno = document.getElementById("progresoRelleno");
    const bossVidaWrap = document.getElementById("bossVidaWrap");
    const bossVidaRelleno = document.getElementById("bossVidaRelleno");
    const imagenLogro = document.getElementById("imagenLogro");
    const imagenLogroSrc = document.getElementById("imagenLogroSrc");
    const anuncioNivel = document.getElementById("anuncioNivel");
    const reinicioWrap = document.getElementById("reinicioWrap");
    const btnReiniciar = document.getElementById("btnReiniciar");
    const teclasNumericas = document.querySelectorAll("[data-num]");
    let timerImagen = null;

    const imagenesPorNivel = {
      1: "./feliz.png",
      2: "./feliz4.png",
      3: "./feliz2.png",
      4: "./spider3.png",
      5: "./bu.jpg",
      6: "./aa.png"
    };

    const chips = [];
    for (let i = 1; i <= 6; i++) {
      chips[i] = document.getElementById(i === 6 ? "chip-nivel-6" : "chip-nivel-" + i);
    }

    function actualizarTextoNivel() {
      textoNivel.textContent = nivelActual === 6 ? "BOSS FINAL" : "NIVEL " + nivelActual;
      textoProgreso.textContent = aciertosNivel + " / " + metaPorNivel;
      mensajeBoss.textContent = "";
      actualizarBarras();
    }

    function actualizarBarras() {
      const restante = Math.max(metaPorNivel - aciertosNivel, 0);
      const progreso = (aciertosNivel / metaPorNivel) * 100;
      const vidaBoss = (restante / metaPorNivel) * 100;

      if (nivelActual >= 1 && nivelActual <= 5) {
        progresoWrap.style.display = "block";
        bossVidaWrap.style.display = "none";
        progresoRelleno.style.width = progreso + "%";
      } else if (nivelActual === 6) {
        progresoWrap.style.display = "none";
        bossVidaWrap.style.display = "block";
        bossVidaRelleno.style.width = vidaBoss + "%";
      } else {
        progresoWrap.style.display = "none";
        bossVidaWrap.style.display = "none";
      }
    }

    function mostrarAnuncio(texto) {
      anuncioNivel.textContent = texto;
      anuncioNivel.style.display = "flex";
    }

    function ocultarAnuncio() {
      anuncioNivel.style.display = "none";
    }

    function mostrarAnuncioFinal() {
      mostrarAnuncio("FELICIDADES MAXI,\nte sacaste un 7,0");
      setTimeout(() => {
        ocultarAnuncio();
        reinicioWrap.style.display = "flex";
      }, 10000);
    }

    function reiniciarJuego() {
      if (timerSiguiente) {
        clearTimeout(timerSiguiente);
      }
      if (timerImagen) {
        clearTimeout(timerImagen);
      }
      ocultarAnuncio();
      imagenLogro.style.display = "none";
      reinicioWrap.style.display = "none";

      numero1 = null;
      numero2 = null;
      nivelActual = 1;
      aciertosNivel = 0;
      entradaActual = "";
      bloqueado = false;
      juegoTerminado = false;

      actualizarChips();
      actualizarTextoNivel();
      actualizarPantallaRespuesta();
      generarSuma();
    }

    function mostrarImagenLogro() {
      const ruta = imagenesPorNivel[nivelActual];
      if (!ruta) {
        return;
      }

      imagenLogroSrc.src = ruta;
      imagenLogro.style.display = "flex";

      if (timerImagen) {
        clearTimeout(timerImagen);
      }

      timerImagen = setTimeout(() => {
        imagenLogro.style.display = "none";
      }, 1000);
    }

    function actualizarPantallaRespuesta() {
      pantallaRespuesta.textContent = entradaActual === "" ? "_" : entradaActual;
    }

    function actualizarChips() {
      for (let i = 1; i <= 6; i++) {
        chips[i].classList.remove("activo", "completado");
        if (i < nivelActual) {
          chips[i].classList.add("completado");
        } else if (i === nivelActual) {
          chips[i].classList.add("activo");
        }
      }
    }

    function generarSuma() {
      if (nivelActual === 1) {
        // Nivel 1: primer número solo 0 o 1
        numero1 = Math.floor(Math.random() * 2); // 0 o 1
        numero2 = Math.floor(Math.random() * 11); // 0 a 10
      } else if (nivelActual === 2) {
        numero1 = Math.floor(Math.random() * 5); // 0 a 4
        numero2 = Math.floor(Math.random() * 5); // 0 a 4
      } else if (nivelActual === 3) {
        numero1 = Math.floor(Math.random() * 7); // 0 a 6
        numero2 = Math.floor(Math.random() * 7); // 0 a 6
      } else if (nivelActual === 4) {
        numero1 = Math.floor(Math.random() * 9); // 0 a 8
        numero2 = Math.floor(Math.random() * 9); // 0 a 8
      } else if (nivelActual === 5) {
        numero1 = Math.floor(Math.random() * 11); // 0 a 10
        numero2 = Math.floor(Math.random() * 11); // 0 a 10
      } else {
        // Boss Fight: 1 a 10
        numero1 = Math.floor(Math.random() * 10) + 1;
        numero2 = Math.floor(Math.random() * 10) + 1;
      }

      operacion.textContent = numero1 + " + " + numero2 + " = ?";

      entradaActual = "";
      actualizarPantallaRespuesta();
      mensaje.textContent = "";
      mensaje.className = "mensaje";
      bloqueado = false;
    }

    function pasarDeNivel() {
      aciertosNivel = 0;
      if (nivelActual < 6) {
        nivelActual++;
        const textoAnuncio = nivelActual === 6 ? "BOSS FIGHT" : "NIVEL " + nivelActual;
        mensaje.textContent = textoAnuncio;
        mensaje.className = "mensaje ok";
        actualizarChips();
        actualizarTextoNivel();
        mostrarAnuncio(textoAnuncio);
        return "subio";
      } else {
        juegoTerminado = true;
        mensaje.textContent = "FELICIDADES MAXI";
        mensaje.className = "mensaje ok";
        mostrarAnuncioFinal();
        return "final";
      }
    }

    function comprobarRespuesta() {
      if (bloqueado || juegoTerminado) {
        return;
      }

      if (numero1 === null) {
        mensaje.textContent = "ESPERA";
        mensaje.className = "mensaje error";
        return;
      }

      if (entradaActual === "") {
        mensaje.textContent = "ESCRIBE UN NÚMERO";
        mensaje.className = "mensaje error";
        return;
      }

      const valorIngresado = Number(entradaActual);
      const resultadoCorrecto = numero1 + numero2;
      bloqueado = true;

      if (valorIngresado === resultadoCorrecto) {
        aciertosNivel++;
        actualizarBarras();
        mensaje.textContent = "MUY BIEN MAXI! SIGUE ASÍ!";
        mensaje.className = "mensaje ok";
        let estadoNivel = "normal";
        if (aciertosNivel >= metaPorNivel) {
          estadoNivel = pasarDeNivel();
        } else {
          textoProgreso.textContent = aciertosNivel + " / " + metaPorNivel;
        }

        if (estadoNivel === "normal") {
          mostrarImagenLogro();
        }

        if (timerSiguiente) {
          clearTimeout(timerSiguiente);
        }

        if (estadoNivel === "subio") {
          timerSiguiente = setTimeout(() => {
            ocultarAnuncio();
            generarSuma();
          }, 4000);
        } else if (estadoNivel === "normal") {
          timerSiguiente = setTimeout(() => {
            generarSuma();
          }, 2000);
        }
      } else {
        mensaje.textContent = "VUELVE A INTENTARLO, TÚ PUEDES!";
        mensaje.className = "mensaje error";
        if (timerSiguiente) {
          clearTimeout(timerSiguiente);
        }
        timerSiguiente = setTimeout(() => {
          generarSuma();
        }, 2000);
      }
    }

    teclasNumericas.forEach((tecla) => {
      tecla.addEventListener("click", () => {
        if (bloqueado || juegoTerminado) {
          return;
        }
        if (entradaActual.length >= 2) {
          return;
        }
        entradaActual += tecla.dataset.num;
        actualizarPantallaRespuesta();
      });
    });

    btnBorrar.addEventListener("click", () => {
      if (bloqueado || juegoTerminado) {
        return;
      }
      entradaActual = entradaActual.slice(0, -1);
      actualizarPantallaRespuesta();
    });

    btnTodoBorrar.addEventListener("click", () => {
      if (bloqueado || juegoTerminado) {
        return;
      }
      entradaActual = "";
      actualizarPantallaRespuesta();
    });

    btnComprobar.addEventListener("click", comprobarRespuesta);
    btnReiniciar.addEventListener("click", reiniciarJuego);

    // Estado inicial de textos y niveles
    actualizarChips();
    actualizarTextoNivel();
    actualizarPantallaRespuesta();
    generarSuma();
  </script>
</body>
</html>
