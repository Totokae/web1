<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAXILIMON - Sumas</title>
  <style>
    :root {
      --bg1: #0b1023;
      --bg2: #142850;
      --card: #1f2a44;
      --text: #f5f7ff;
      --accent: #ff4757;
      --accent2: #2ed573;
      --accent3: #1e90ff;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    .contenedor {
      width: 100vw;
      min-height: 100vh;
      background: var(--card);
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .fondos-bloques {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        linear-gradient(#00ff8877 2px, transparent 2px),
        linear-gradient(90deg, #00ff8877 2px, transparent 2px);
      background-size: 40px 40px;
      mix-blend-mode: screen;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 1px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      text-shadow: 0 0 10px #ff4757aa;
    }

    .subtitulo {
      margin-top: 0;
      margin-bottom: 12px;
      color: #fffa;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700;
    }

    .niveles-barra {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .nivel-chip {
      min-width: 72px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 3px solid #ffffff55;
      font-size: 1.1rem;
      color: #dfe6ff;
      background: #00000055;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .nivel-chip.activo {
      background: linear-gradient(135deg, #ff4757, #ffa502);
      border-color: #ffffffcc;
      color: #fff;
      box-shadow: 0 0 12px #ff4757aa;
      transform: translateY(-1px);
    }

    .nivel-chip.completado {
      background: linear-gradient(135deg, #2ed573, #1e90ff);
      border-color: #ffffffcc;
      color: #fff;
    }

    .nivel-chip span {
      font-weight: 700;
    }

    .boss-chip {
      border-color: #ff00ffaa;
      background: radial-gradient(circle at top, #ff00ff, #341f97);
    }

    .operacion {
      font-size: clamp(3rem, 11vw, 7rem);
      font-weight: 800;
      margin: 10px 0;
      min-height: 100px;
      color: #ffffff;
      background: linear-gradient(90deg, #ff475744, #1e90ff55);
      border-radius: 18px;
      padding: 16px 22px;
    }

    .texto-nivel {
      font-size: clamp(1.3rem, 3.8vw, 2rem);
      color: #e0e8ff;
      margin-top: 0;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .progreso {
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      color: #c7d2ff;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .fila {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    button, input {
      border: none;
      border-radius: 16px;
      padding: 20px 26px;
      font-size: clamp(1.4rem, 3.8vw, 2.3rem);
    }

    button {
      cursor: pointer;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 4px 0 #00000066;
      transform: translateY(0);
      transition: transform 0.08s, box-shadow 0.08s, filter 0.15s;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #00000066;
      filter: brightness(0.9);
    }

    #btnGenerar {
      background: linear-gradient(135deg, #1e90ff, #00d2ff);
    }

    #btnRevisar {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
    }

    input {
      width: min(260px, 80vw);
      text-align: center;
      font-weight: 800;
      border-radius: 16px;
      border: 3px solid #ffffff88;
      background: #00000055;
      color: #fff;
    }

    .mensaje {
      min-height: 92px;
      margin-top: 8px;
      border-radius: 16px;
      padding: 18px;
      background: #00000055;
      font-size: clamp(1.5rem, 4.5vw, 2.6rem);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ok {
      color: var(--accent2);
    }

    .error {
      color: #ffd166;
    }

    .boss-mensaje { display: none; }
  </style>
</head>
<body>
  <main class="contenedor">
    <div class="fondos-bloques"></div>

    <h1>MAXILIMÓN</h1>
    <p class="subtitulo">SUMAS</p>

    <div class="niveles-barra">
      <div class="nivel-chip activo" id="chip-nivel-1"><span>1</span></div>
      <div class="nivel-chip" id="chip-nivel-2"><span>2</span></div>
      <div class="nivel-chip" id="chip-nivel-3"><span>3</span></div>
      <div class="nivel-chip" id="chip-nivel-4"><span>4</span></div>
      <div class="nivel-chip" id="chip-nivel-5"><span>5</span></div>
      <div class="nivel-chip boss-chip" id="chip-nivel-6"><span>BOSS</span></div>
    </div>

    <p id="textoNivel" class="texto-nivel"></p>
    <p id="textoProgreso" class="progreso"></p>

    <div id="operacion" class="operacion">TOCA NUEVA SUMA</div>

    <div class="fila">
      <button id="btnGenerar" type="button">NUEVA SUMA</button>
      <input id="respuesta" type="number" placeholder="Resultado" min="0" max="40">
      <button id="btnRevisar" type="button">REVISAR</button>
    </div>

    <div id="mensaje" class="mensaje"></div>
    <div id="mensajeBoss" class="boss-mensaje"></div>
  </main>

  <script>
    let numero1 = null;
    let numero2 = null;
    let nivelActual = 1;       // 1 a 6 (6 = BOSS)
    let aciertosNivel = 0;
    const metaPorNivel = 5;    // 5 aciertos para pasar cada nivel

    const operacion = document.getElementById("operacion");
    const respuesta = document.getElementById("respuesta");
    const mensaje = document.getElementById("mensaje");
    const mensajeBoss = document.getElementById("mensajeBoss");
    const btnGenerar = document.getElementById("btnGenerar");
    const btnRevisar = document.getElementById("btnRevisar");
    const textoNivel = document.getElementById("textoNivel");
    const textoProgreso = document.getElementById("textoProgreso");

    const chips = [];
    for (let i = 1; i <= 6; i++) {
      chips[i] = document.getElementById(i === 6 ? "chip-nivel-6" : "chip-nivel-" + i);
    }

    function actualizarTextoNivel() {
      textoNivel.textContent = nivelActual === 6 ? "BOSS FINAL" : "NIVEL " + nivelActual;
      textoProgreso.textContent = aciertosNivel + " / " + metaPorNivel;
      mensajeBoss.textContent = "";
    }

    function actualizarChips() {
      for (let i = 1; i <= 6; i++) {
        chips[i].classList.remove("activo", "completado");
        if (i < nivelActual) {
          chips[i].classList.add("completado");
        } else if (i === nivelActual) {
          chips[i].classList.add("activo");
        }
      }
    }

    function rangoMaximoSegunNivel() {
      switch (nivelActual) {
        case 1: return 5;
        case 2: return 10;
        case 3: return 12;
        case 4: return 15;
        case 5: return 20;
        case 6: return 20; // boss: usaremos dos sumas encadenadas pero con estos límites
        default: return 10;
      }
    }

    function generarSuma() {
      const max = rangoMaximoSegunNivel();
      numero1 = Math.floor(Math.random() * (max + 1));
      numero2 = Math.floor(Math.random() * (max + 1));

      if (nivelActual === 6) {
        // Boss: operación doble
        const extra1 = Math.floor(Math.random() * 6);  // 0-5
        const extra2 = Math.floor(Math.random() * 6);
        operacion.textContent = "(" + numero1 + " + " + numero2 + ") + (" + extra1 + " + " + extra2 + ") = ?";
        numero1 = numero1 + numero2 + extra1 + extra2;
        numero2 = 0;
      } else {
        operacion.textContent = numero1 + " + " + numero2 + " = ?";
      }

      respuesta.value = "";
      respuesta.focus();
      mensaje.textContent = "";
      mensaje.className = "mensaje";
    }

    function pasarDeNivel() {
      aciertosNivel = 0;
      if (nivelActual < 6) {
        nivelActual++;
        mensaje.textContent = nivelActual === 6 ? "BOSS FINAL" : "NIVEL " + nivelActual;
        mensaje.className = "mensaje ok";
        actualizarChips();
        actualizarTextoNivel();
      } else {
        mensaje.textContent = "MUY BIEN MAXI! SIGUE ASÍ!";
        mensaje.className = "mensaje ok";
      }
    }

    function revisarRespuesta() {
      if (numero1 === null) {
        mensaje.textContent = "TOCA NUEVA SUMA";
        mensaje.className = "mensaje error";
        return;
      }

      const valorIngresado = Number(respuesta.value);
      const resultadoCorrecto = nivelActual === 6 ? numero1 : (numero1 + numero2);

      if (valorIngresado === resultadoCorrecto) {
        aciertosNivel++;
        mensaje.textContent = "MUY BIEN MAXI! SIGUE ASÍ!";
        mensaje.className = "mensaje ok";
        if (aciertosNivel >= metaPorNivel) {
          pasarDeNivel();
        } else {
          textoProgreso.textContent = aciertosNivel + " / " + metaPorNivel;
        }
      } else {
        mensaje.textContent = "VUELVE A INTENTARLO, TÚ PUEDES!";
        mensaje.className = "mensaje error";
      }
    }

    btnGenerar.addEventListener("click", generarSuma);
    btnRevisar.addEventListener("click", revisarRespuesta);

    // Estado inicial de textos y niveles
    actualizarChips();
    actualizarTextoNivel();
  </script>
</body>
</html>
